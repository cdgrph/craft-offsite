name: CI
on:
  push: { branches: [main] }
  pull_request:
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  engine-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix: { php: ['8.2', '8.3'] }
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with: { php-version: '${{ matrix.php }}', extensions: 'zip, curl, intl' }
      - run: composer install --no-interaction --prefer-dist
      - run: vendor/bin/phpunit --testsuite engine
  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # bitnami/minio was removed from Docker Hub, so start minio/minio via
      # docker run instead of a service container (services cannot pass command args)
      - run: docker run -d -p 9000:9000 -e MINIO_ROOT_USER=offsite -e MINIO_ROOT_PASSWORD=offsite-secret minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e server /data
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with: { php-version: '8.3', extensions: 'zip, curl, intl' }
      - run: composer install --no-interaction --prefer-dist
      - run: OFFSITE_TEST_S3=1 vendor/bin/phpunit --testsuite integration
